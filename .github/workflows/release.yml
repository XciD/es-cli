name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf es-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz es-cli
          mv es-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: es-cli-${{ matrix.target }}
          path: es-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            file="artifacts/es-cli-${{ github.ref_name }}-${target}.tar.gz"
            sha=$(shasum -a 256 "$file" | awk '{print $1}')
            key=$(echo "$target" | tr '-' '_')
            echo "${key}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: XciD/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
          SHA_AARCH64_APPLE: ${{ steps.sha.outputs.aarch64_apple_darwin }}
          SHA_X86_64_APPLE: ${{ steps.sha.outputs.x86_64_apple_darwin }}
          SHA_AARCH64_LINUX: ${{ steps.sha.outputs.aarch64_unknown_linux_gnu }}
          SHA_X86_64_LINUX: ${{ steps.sha.outputs.x86_64_unknown_linux_gnu }}
        run: |
          # Strip leading 'v' for the version field
          ver="${VERSION#v}"
          cat > Formula/es-cli.rb << 'FORMULA'
          class EsCli < Formula
            desc "CLI tool for querying Elasticsearch"
            homepage "https://github.com/XciD/es-cli"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/XciD/es-cli/releases/download/vVERSION_PLACEHOLDER/es-cli-vVERSION_PLACEHOLDER-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_AARCH64_APPLE_PLACEHOLDER"
              else
                url "https://github.com/XciD/es-cli/releases/download/vVERSION_PLACEHOLDER/es-cli-vVERSION_PLACEHOLDER-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_X86_64_APPLE_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/XciD/es-cli/releases/download/vVERSION_PLACEHOLDER/es-cli-vVERSION_PLACEHOLDER-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_AARCH64_LINUX_PLACEHOLDER"
              else
                url "https://github.com/XciD/es-cli/releases/download/vVERSION_PLACEHOLDER/es-cli-vVERSION_PLACEHOLDER-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_X86_64_LINUX_PLACEHOLDER"
              end
            end

            def install
              bin.install "es-cli"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/es-cli --version")
            end
          end
          FORMULA
          # Replace placeholders with actual values
          sed -i "s/VERSION_PLACEHOLDER/${ver}/g" Formula/es-cli.rb
          sed -i "s/SHA_AARCH64_APPLE_PLACEHOLDER/${SHA_AARCH64_APPLE}/g" Formula/es-cli.rb
          sed -i "s/SHA_X86_64_APPLE_PLACEHOLDER/${SHA_X86_64_APPLE}/g" Formula/es-cli.rb
          sed -i "s/SHA_AARCH64_LINUX_PLACEHOLDER/${SHA_AARCH64_LINUX}/g" Formula/es-cli.rb
          sed -i "s/SHA_X86_64_LINUX_PLACEHOLDER/${SHA_X86_64_LINUX}/g" Formula/es-cli.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/es-cli.rb
          git commit -m "chore: update es-cli to ${{ github.ref_name }}"
          git push
